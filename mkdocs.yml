# ============================================================
# MkDocs Configuration — Mandarin Startup
# Owner: Publicatie Steward
# Doel: Publicatie van strategische documentatie
# ============================================================

# ------------------------------------------------------------
# 1. Site Identiteit
# ------------------------------------------------------------
site_name: "Tuin — Langs de Rijn 5"
site_description: "Plannen voor onderhoud een aanpassen tuin Langs de Rijn 5"
site_author: "Hans Blok"
site_url: "https://hans-blok.github.io/flora-ldr5/"

# ------------------------------------------------------------
# 2. Documentatie Bron
# ------------------------------------------------------------
docs_dir: "docs"
site_dir: "site"

# ------------------------------------------------------------
# 3. Theme & Presentatie
# Mandarin huisstijl met Material theme
# ------------------------------------------------------------
theme:
  name: "material"
  language: "nl"
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - content.code.copy
    - content.code.annotate
    - toc.integrate
    - search.suggest
    - search.highlight
  palette:
    primary: "custom"
    accent: "custom"
  font:
    text: "Lato"
    code: "Source Code Pro"

# ------------------------------------------------------------
# 4. Custom Styling - Mandarin Stylesheet
# Eigendom: Presentatie Architect
# ------------------------------------------------------------
extra_css:
  - assets/stylesheets/tuin.css

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js

# ------------------------------------------------------------
# 5. Plugins
# ------------------------------------------------------------
plugins:
  - search:
      lang: nl

# ------------------------------------------------------------
# 6. Markdown Extensies
# ------------------------------------------------------------
markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3

  # Python Markdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# ------------------------------------------------------------
# 7. Navigatiestructuur
# Primaire verantwoordelijkheid: Publicatie Steward
# ------------------------------------------------------------
nav:
  - Home: index.md
  - Mijn Planten & Borders: mijn-planten-borders.md
  - Mestplan: mestplan.md
  - Boodschappen:
    - Boodschappen — april 2026: boodschappen/boodschappen-2026-04-04.md

# ------------------------------------------------------------
# 8. Extra Configuratie
# ------------------------------------------------------------
extra:
  social: []
  generator: false  # Verberg "Made with Material for MkDocs"

# ------------------------------------------------------------
# 9. Copyright
# ------------------------------------------------------------
copyright: "Copyright geen; 2026 Hans Blok. Open Source"


